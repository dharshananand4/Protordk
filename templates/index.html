<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protordk - AI Text Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Protordk</h1>
            <p>Advanced AI-Powered Text Analysis</p>
        </header>

        <nav class="tabs">
            <button class="tab-button active" onclick="switchTab('sentiment')">Sentiment</button>
            <button class="tab-button" onclick="switchTab('classify')">Classify</button>
            <button class="tab-button" onclick="switchTab('ner')">Entities</button>
            <button class="tab-button" onclick="switchTab('summarize')">Summarize</button>
            <button class="tab-button" onclick="switchTab('keywords')">Keywords</button>
            <button class="tab-button" onclick="switchTab('analyze-all')">All Analysis</button>
        </nav>

        <!-- Sentiment Analysis -->
        <div id="sentiment" class="tab-content active">
            <h2>Sentiment Analysis</h2>
            <textarea id="sentimentText" placeholder="Enter text to analyze sentiment..."></textarea>
            <button onclick="analyzeSentiment()">Analyze Sentiment</button>
            <div id="sentimentResult" class="result"></div>
        </div>

        <!-- Text Classification -->
        <div id="classify" class="tab-content">
            <h2>Text Classification</h2>
            <textarea id="classifyText" placeholder="Enter text to classify..."></textarea>
            <input type="text" id="categories" placeholder="Categories (comma-separated)" value="technology,sports,politics,entertainment,science">
            <button onclick="classifyText()">Classify Text</button>
            <div id="classifyResult" class="result"></div>
        </div>

        <!-- Named Entity Recognition -->
        <div id="ner" class="tab-content">
            <h2>Named Entity Recognition</h2>
            <textarea id="nerText" placeholder="Enter text to extract entities..."></textarea>
            <button onclick="extractEntities()">Extract Entities</button>
            <div id="nerResult" class="result"></div>
        </div>

        <!-- Text Summarization -->
        <div id="summarize" class="tab-content">
            <h2>Text Summarization</h2>
            <textarea id="summarizeText" placeholder="Enter text to summarize (minimum 50 words)..."></textarea>
            <div class="input-group">
                <label>Max Length: <input type="number" id="maxLength" value="100" min="30" max="200"></label>
                <label>Min Length: <input type="number" id="minLength" value="30" min="10" max="100"></label>
            </div>
            <button onclick="summarizeText()">Summarize</button>
            <div id="summarizeResult" class="result"></div>
        </div>

        <!-- Keyword Extraction -->
        <div id="keywords" class="tab-content">
            <h2>Keyword Extraction</h2>
            <textarea id="keywordsText" placeholder="Enter text to extract keywords..."></textarea>
            <label>Number of Keywords: <input type="number" id="numKeywords" value="10" min="1" max="20"></label>
            <button onclick="extractKeywords()">Extract Keywords</button>
            <div id="keywordsResult" class="result"></div>
        </div>

        <!-- All Analysis -->
        <div id="analyze-all" class="tab-content">
            <h2>Complete Text Analysis</h2>
            <textarea id="analyzeAllText" placeholder="Enter text for complete analysis..."></textarea>
            <button onclick="analyzeAll()">Analyze All</button>
            <div id="analyzeAllResult" class="result"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
